<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taste Atlas - Search</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="map-page">
    <main id="search-shell" class="search-shell idle">
      <section class="left-stage">
        <div class="hero-copy">
          <h1>Explore and Map your</h1>
          <p>Taste Atlas +</p>
        </div>

        <section id="search-results" class="search-results hidden">
          <h3>Search Results</h3>
          <div class="result-columns">
            <div>
              <h4 id="content-result-heading">Content</h4>
              <ul id="content-result-list" class="search-result-list"></ul>
            </div>
            <div>
              <h4 id="person-result-heading">People</h4>
              <ul id="person-result-list" class="search-result-list"></ul>
            </div>
          </div>
        </section>
      </section>

      <section class="right-stage">
        <header class="floating-head">
          <h2><a class="brand-link" href="./map.html">Taste Atlas</a></h2>
          <nav class="top-nav">
            <a href="./map.html" class="active">search</a>
            <a href="./nodes.html">node</a>
            <a href="./archive.html">archive</a>
          </nav>
        </header>

        <section class="floating-search">
          <p id="source-status" class="status">Checking data sources...</p>
          <form id="taste-form">
            <div class="type-buttons">
              <button id="type-movie" type="button" class="type-btn active">film</button>
              <button id="type-music" type="button" class="type-btn">music</button>
            </div>
            <div class="search-row">
              <label for="title" class="sr-only">Search</label>
              <input id="title" name="title" placeholder="Search title / director / artist / album" />
              <button type="submit" class="search-icon" aria-label="search">⌕</button>
            </div>
          </form>
        </section>

        <section class="info-stage">
          <div id="detail-empty" class="muted hidden"></div>
          <article id="detail-card" class="hidden">
            <h4 id="detail-title"></h4>
            <p id="detail-type" class="badge"></p>
            <img id="detail-poster" class="archive-poster hidden" alt="poster" />
            <p id="detail-desc"></p>
            <h5>Connected To</h5>
            <div id="detail-connected-sections"></div>
          </article>
        </section>
      </section>
    </main>
    <script src="./search.js"></script>
  </body>
</html>
