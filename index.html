<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taste Atlas</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>Taste Atlas</h1>
      <p>내 취향을 지식지도로 펼치는 아카이브</p>
    </header>

    <main class="layout">
      <section class="panel input-panel">
        <h2>Seed Your Taste</h2>
        <p class="muted">좋아하는 음악/영화를 입력하면 지도에 노드를 추가합니다.</p>
        <p id="source-status" class="status">Checking data sources...</p>

        <form id="taste-form">
          <label for="type">Type</label>
          <select id="type" name="type">
            <option value="music">Music</option>
            <option value="movie">Movie</option>
          </select>

          <label for="title">Title</label>
          <input id="title" name="title" placeholder="예: Pulp Fiction / Radiohead" />

          <button type="submit">Add to Map (Live API)</button>
        </form>

        <div class="chips">
          <button class="chip" data-seed="pulp-fiction">Pulp Fiction</button>
          <button class="chip" data-seed="hitchcock">Alfred Hitchcock</button>
          <button class="chip" data-seed="radiohead">Radiohead</button>
          <button class="chip" data-seed="shoegaze">Shoegaze</button>
        </div>
      </section>

      <section class="panel map-panel">
        <div class="panel-head">
          <h2>Knowledge Map</h2>
          <span class="muted" id="node-count">0 nodes</span>
        </div>
        <svg id="map" viewBox="0 0 900 560" aria-label="knowledge map"></svg>
      </section>

      <section class="panel archive-panel">
        <h2>Archive</h2>
        <div id="archive-empty" class="muted">노드를 클릭하면 상세 맥락이 보입니다.</div>
        <article id="archive-card" class="archive-card hidden">
          <h3 id="archive-title"></h3>
          <p id="archive-type" class="badge"></p>
          <p id="archive-desc"></p>
          <h4>Study Path</h4>
          <ul id="archive-path"></ul>
          <h4>Connected To</h4>
          <ul id="archive-links"></ul>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <small>White/Black minimal UI · English: Helvetica · Korean: Pretendard</small>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
